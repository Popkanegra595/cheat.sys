<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHEAT.SYS</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green:     #00ff41;
      --green-dim: #00aa2a;
      --bg:        #000;
      --surface:   #080808;
      --text:      #c8c8c8;
      --white:     #fff;
      --glow:      0 0 8px #00ff41, 0 0 24px #00ff4166;
      --glow-sm:   0 0 4px #00ff41, 0 0 12px #00ff4144;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh; overflow-x: hidden;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.15) 2px, rgba(0,0,0,.15) 4px);
      pointer-events: none; z-index: 9999;
    }
    @keyframes blink { 50% { opacity: 0; } }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 32px; border-bottom: 1px solid var(--green-dim);
      background: rgba(0,255,65,.03);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-family: 'VT323', monospace; font-size: 1.9rem; color: var(--green); text-shadow: var(--glow); letter-spacing: 4px; }
    .logo span { color: var(--white); }
    .status { font-size: .72rem; color: var(--green-dim); animation: blink 1.4s step-end infinite; }

    .video-wrap {
      position: relative; width: 100%; height: 400px;
      overflow: hidden; border-bottom: 2px solid var(--green);
      box-shadow: 0 0 40px #00ff4133;
    }
    .video-bg { width: 100%; height: 100%; background: #000; }
    .video-bg canvas { width: 100%; height: 100%; display: block; }
    .video-wrap video {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; filter: grayscale(1) contrast(1.3) brightness(.8);
    }
    .video-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 55%, var(--bg) 100%);
      z-index: 2;
    }
    .corner { position: absolute; width: 26px; height: 26px; z-index: 3; }
    .corner--tl { top:14px; left:14px;  border-top:2px solid var(--green); border-left:2px solid var(--green); }
    .corner--tr { top:14px; right:14px; border-top:2px solid var(--green); border-right:2px solid var(--green); }
    .corner--bl { bottom:14px; left:14px;  border-bottom:2px solid var(--green); border-left:2px solid var(--green); }
    .corner--br { bottom:14px; right:14px; border-bottom:2px solid var(--green); border-right:2px solid var(--green); }

    .hero { text-align: center; padding: 52px 24px 36px; }
    .hero__pre { font-size: .72rem; color: var(--green-dim); letter-spacing: 6px; margin-bottom: 14px; }
    .hero__title { font-family: 'VT323', monospace; font-size: clamp(2.4rem,6vw,4.2rem); color: var(--white); text-shadow: var(--glow); line-height: 1.1; margin-bottom: 16px; }
    .hero__title .acc { color: var(--green); }
    .hero__sub { font-size: .88rem; color: #777; max-width: 520px; margin: 0 auto 26px; line-height: 1.8; }
    .hero__sub b { color: var(--green); }
    .hero__prompt { display: inline-block; font-size: .8rem; color: var(--green); border: 1px solid var(--green-dim); padding: 8px 20px; border-radius: 2px; box-shadow: var(--glow-sm); }
    .cursor { display: inline-block; width: 9px; height: 1em; background: var(--green); vertical-align: text-bottom; animation: blink .8s step-end infinite; }

    .divider { display: flex; align-items: center; gap: 14px; padding: 0 32px; margin: 0 auto 28px; max-width: 1200px; }
    .divider__line { flex:1; height:1px; }
    .divider__line.l { background: linear-gradient(to right, var(--green-dim), transparent); }
    .divider__line.r { background: linear-gradient(to left, var(--green-dim), transparent); }
    .divider__text { font-size: .7rem; color: var(--green); letter-spacing: 5px; white-space: nowrap; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px,1fr)); gap: 20px; padding: 0 32px 64px; max-width: 1200px; margin: 0 auto; }

    .empty { grid-column:1/-1; text-align:center; padding:60px 20px; color:#333; font-size:.85rem; line-height:2; }
    .empty b { color:#555; }
    .loading { grid-column:1/-1; text-align:center; padding:60px; color:var(--green-dim); font-size:.8rem; letter-spacing:4px; animation: blink 1s step-end infinite; }

    /* CARD */
    .card {
      background: var(--surface); border: 1px solid #1c1c1c;
      border-radius: 3px; overflow: hidden;
      transition: border-color .25s, box-shadow .25s, transform .25s;
      cursor: pointer; display: block; text-decoration: none; color: inherit;
    }
    .card:hover { border-color: var(--green-dim); box-shadow: 0 0 20px #00ff4118, 0 4px 32px rgba(0,0,0,.6); transform: translateY(-4px); }
    .card__bar { display:flex; align-items:center; gap:6px; padding:8px 12px; background:#0d0d0d; border-bottom:1px solid #181818; }
    .card__dot { width:10px; height:10px; border-radius:50%; }
    .card__dot:nth-child(1){background:#3a3a3a}
    .card__dot:nth-child(2){background:#2a2a2a}
    .card__dot:nth-child(3){background:#1e1e1e}
    .card__bar-title { margin-left:6px; font-size:.62rem; color:#3a3a3a; letter-spacing:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:180px; }
    .card__img-wrap { position:relative; width:100%; height:155px; overflow:hidden; background:#0a0a0a; }
    .card__img-wrap img { width:100%; height:100%; object-fit:cover; filter:grayscale(1) contrast(1.2); transition:filter .3s; }
    .card:hover .card__img-wrap img { filter:grayscale(.5) contrast(1.15); }
    .card__img-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-family:'VT323',monospace; font-size:3rem; color:#1a1a1a; background:repeating-linear-gradient(45deg,#080808 0,#080808 10px,#0a0a0a 10px,#0a0a0a 20px); }
    .card__img-scan { position:absolute; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,65,.03) 3px,rgba(0,255,65,.03) 4px); pointer-events:none; }
    .card__badge { position:absolute; top:10px; right:10px; background:#000; border:1px solid var(--green); color:var(--green); font-size:.58rem; padding:3px 8px; letter-spacing:2px; box-shadow:var(--glow-sm); }
    .card__body { padding:15px; }
    .card__game { font-size:.62rem; color:#3d3d3d; letter-spacing:3px; margin-bottom:5px; text-transform:uppercase; }
    .card__name { font-family:'VT323',monospace; font-size:1.45rem; color:var(--white); margin-bottom:10px; line-height:1.2; }
    .card__features { list-style:none; margin-bottom:14px; }
    .card__features li { font-size:.68rem; color:#555; padding:3px 0 3px 14px; position:relative; }
    .card__features li::before { content:'>'; position:absolute; left:0; color:var(--green); }
    .card__foot { display:flex; align-items:center; justify-content:space-between; border-top:1px solid #141414; padding-top:13px; }
    .card__version { font-size:.6rem; color:#333; letter-spacing:1px; }

    /* две кнопки на карточке */
    .card__actions { display:flex; gap:8px; }
    .btn-view, .btn-dl {
      display:inline-flex; align-items:center; gap:6px;
      background:transparent; border:1px solid #2a2a2a;
      color:#555; font-family:'Share Tech Mono',monospace;
      font-size:.65rem; letter-spacing:1px;
      padding:7px 12px; cursor:pointer;
      text-decoration:none; border-radius:2px;
      transition:all .2s; position:relative; overflow:hidden;
    }
    .btn-dl { border-color:var(--green); color:var(--green); }
    .btn-dl::before {
      content:''; position:absolute; inset:0;
      background:var(--green); transform:translateX(-100%);
      transition:transform .22s ease; z-index:0;
    }
    .btn-dl:hover::before { transform:translateX(0); }
    .btn-dl:hover { color:#000; box-shadow:var(--glow-sm); }
    .btn-dl span, .btn-dl svg { position:relative; z-index:1; }
    .btn-view:hover { border-color:#444; color:#999; }

    footer { border-top:1px solid #0f0f0f; padding:22px 32px; text-align:center; font-size:.63rem; color:#222; letter-spacing:2px; }
    footer b { color:#3a3a3a; }

    @media(max-width:600px){
      .grid { padding:0 14px 48px; }
      header { padding:10px 16px; }
      .video-wrap { height:260px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo"><span>[</span>CHEAT<span>.</span>SYS<span>]</span></div>
  <div class="status">● SYSTEM ONLINE</div>
</header>

<div class="video-wrap">
  <!--
  <video autoplay muted loop playsinline>
    <source src="video/background.mp4" type="video/mp4">
  </video>
  -->
  <div class="video-bg"><canvas id="matrix"></canvas></div>
  <div class="video-overlay"></div>
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>
</div>

<section class="hero">
  <p class="hero__pre">// UNDERGROUND SOFTWARE MARKETPLACE //</p>
  <h1 class="hero__title">NEXT-GEN <span class="acc">GAME</span><br>MODIFICATIONS</h1>
  <p class="hero__sub">Проверенные <b>читы и моды</b>. Просто скачай и запусти.</p>
  <div class="hero__prompt"><span>&gt; SELECT_PRODUCT</span><span class="cursor"></span></div>
</section>

<div class="divider">
  <div class="divider__line l"></div>
  <div class="divider__text">// AVAILABLE MODULES //</div>
  <div class="divider__line r"></div>
</div>

<div class="grid" id="grid">
  <div class="loading">LOADING MODULES...</div>
</div>

<footer><b>CHEAT.SYS</b> &nbsp;|&nbsp; USE AT YOUR OWN RISK</footer>

<script>
(function(){
  const canvas = document.getElementById('matrix');
  const ctx = canvas.getContext('2d');
  function resize(){ canvas.width=canvas.offsetWidth; canvas.height=canvas.offsetHeight; }
  resize(); window.addEventListener('resize', resize);
  const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()_+-=[]{}|;:<>?/\\`~';
  const fs=13; let drops=[];
  function init(){ drops=Array(Math.floor(canvas.width/fs)).fill(1); }
  init(); window.addEventListener('resize',init);
  function draw(){
    ctx.fillStyle='rgba(0,0,0,0.06)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.font=`${fs}px "Share Tech Mono",monospace`;
    for(let i=0;i<drops.length;i++){
      const c=chars[Math.floor(Math.random()*chars.length)];
      const bright=Math.random()>.93;
      ctx.fillStyle=bright?'#fff':'#00ff41';
      ctx.globalAlpha=bright?.85:(.25+Math.random()*.5);
      ctx.fillText(c,i*fs,drops[i]*fs); ctx.globalAlpha=1;
      if(drops[i]*fs>canvas.height&&Math.random()>.975) drops[i]=0;
      drops[i]++;
    }
  }
  setInterval(draw,45);
})();
</script>

<script>
const DL_ICON=`<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>`;
const EYE_ICON=`<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;

function fileType(f){ if(!f)return''; const e=f.split('.').pop().toLowerCase(); return{jar:'JAVA',zip:'ZIP',rar:'RAR',exe:'EXE',dll:'DLL'}[e]||e.toUpperCase(); }

function makeCard(item, idx){
  const name  = item.name||(item.file.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ').toUpperCase());
  const badge = item.badge||fileType(item.file);
  const imgSrc= item.image?`images/${item.image}`:null;
  const features=(item.features||[]).slice(0,3);
  const imgHtml=imgSrc
    ?`<img src="${imgSrc}" alt="${name}" onerror="this.parentElement.innerHTML='<div class=card__img-placeholder>[?]</div>'">`
    :`<div class="card__img-placeholder">[?]</div>`;

  return `
<a class="card" href="product.html?id=${idx}">
  <div class="card__bar">
    <div class="card__dot"></div><div class="card__dot"></div><div class="card__dot"></div>
    <span class="card__bar-title">${item.file||'module'}</span>
  </div>
  <div class="card__img-wrap">
    ${imgHtml}
    <div class="card__img-scan"></div>
    ${badge?`<div class="card__badge">${badge}</div>`:''}
  </div>
  <div class="card__body">
    ${item.game?`<div class="card__game">${item.game}</div>`:''}
    <div class="card__name">${name}</div>
    <ul class="card__features">
      ${features.map(f=>`<li>${f}</li>`).join('')}
      ${!features.length?`<li>${fileType(item.file)} module</li>`:''}
    </ul>
    <div class="card__foot">
      <span class="card__version">${item.version||''}</span>
      <div class="card__actions" onclick="event.preventDefault()">
        <a href="product.html?id=${idx}" class="btn-view">${EYE_ICON}</a>
        <a href="files/${item.file}" class="btn-dl" download>${DL_ICON}<span>DL</span></a>
      </div>
    </div>
  </div>
</a>`;
}

async function loadCheats(){
  const grid=document.getElementById('grid');
  try{
    const res=await fetch('cheats.json?v='+Date.now());
    if(!res.ok) throw new Error();
    const items=await res.json();
    if(!items.length){
      grid.innerHTML=`<div class="empty"><b>// НЕТ МОДУЛЕЙ //</b><br><br>Добавь запись в <b>cheats.json</b></div>`;
      return;
    }
    grid.innerHTML=items.map((item,i)=>makeCard(item,i)).join('');
  }catch(e){
    grid.innerHTML=`<div class="empty"><b>// cheats.json не найден //</b><br><br>Убедись что файл лежит рядом с index.html</div>`;
  }
}
loadCheats();
</script>
</body>
</html>
